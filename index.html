<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#87CEEB">
    <title>Stella - Assistant Intelligent</title>
    
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary: #87CEEB; --bg: #f8fafc; --card: #ffffff;
            --text: #1e293b; --text-light: #64748b; --border: #e2e8f0;
            --shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        body.dark-mode {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
            --text-light: #94a3b8; --border: #334155;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 80px; transition: 0.3s; }

        /* Header */
        .header { background: var(--card); padding: 25px; text-align: center; border-bottom: 3px solid var(--primary); position: relative; box-shadow: var(--shadow); }
        .manual-install-btn { position: absolute; left: 20px; top: 25px; cursor: pointer; font-size: 22px; border: none; background: none; color: var(--primary); }
        .theme-toggle { position: absolute; right: 20px; top: 25px; cursor: pointer; font-size: 22px; border: none; background: none; color: var(--primary); }

        /* Navigation */
        .tabs { display: flex; background: var(--card); margin: 20px; padding: 5px; border-radius: 15px; box-shadow: var(--shadow); gap: 5px; }
        .tab-btn { flex: 1; padding: 14px; border: none; border-radius: 12px; background: transparent; color: var(--text-light); font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .tab-btn.active { background: var(--primary); color: white; }

        main { max-width: 1000px; margin: 0 auto; padding: 0 15px; }
        .view { display: none; }
        .view.active { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Éléments Communs */
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); }
        input { width: 100%; padding: 14px; margin-bottom: 12px; border: 1.5px solid var(--border); border-radius: 12px; background: var(--bg); color: var(--text); font-size: 16px; outline: none; }
        .btn-main { width: 100%; padding: 16px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }

        /* Grilles */
        .display-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; width: 100%; }
        
        /* Cartes */
        .item-card { 
            background: var(--card); padding: 20px; border-radius: 18px; border-top: 5px solid var(--primary); 
            min-height: 150px; display: flex; flex-direction: column; justify-content: space-between;
            box-shadow: var(--shadow); 
        }
        .item-body { font-size: 15px; line-height: 1.6; margin-bottom: 10px; }
        .item-actions { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 12px; }
        .action-icon { color: var(--primary); font-size: 18px; cursor: pointer; margin-left: 15px; }

        /* Barre d'outils Notes */
        .toolbar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; background: var(--bg); padding: 10px; border-radius: 10px; }
        .tool-btn { width: 35px; height: 35px; border: none; border-radius: 8px; background: var(--card); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #note-editor { min-height: 150px; border: 1.5px solid var(--border); border-radius: 12px; padding: 15px; background: var(--card); outline: none; margin-bottom: 15px; }

        .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); padding: 30px; border-radius: 20px; width: 90%; max-width: 650px; position: relative; }
        .close-modal { position: absolute; right: 20px; top: 15px; font-size: 28px; cursor: pointer; }
    </style>
</head>
<body>

    <header class="header">
        <button id="manual-install" class="manual-install-btn" onclick="installPWA()"><i class="fas fa-cloud-download-alt"></i></button>
        <h1 style="color: var(--primary);">STELLA</h1>
        <p style="font-size: 13px;">Accueil - Votre Assistant</p>
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-icon"><i class="fas fa-moon"></i></button>
    </header>

    <nav class="tabs">
        <button class="tab-btn active" id="btn-agenda" onclick="switchView('agenda')"><i class="fas fa-calendar-alt"></i> Agenda</button>
        <button class="tab-btn" id="btn-notes" onclick="switchView('notes')"><i class="fas fa-pen-fancy"></i> Notes</button>
    </nav>

    <main>
        <section id="view-agenda" class="view active">
            <div class="card">
                <input type="text" id="task-title" placeholder="Titre de la tâche (ex: Examen de PHP)">
                <input type="datetime-local" id="task-date">
                <button class="btn-main" onclick="saveTask()">Enregistrer la tâche</button>
            </div>
            <div id="tasks-grid" class="display-grid"></div>
        </section>

        <section id="view-notes" class="view">
            <div class="card">
                <div class="toolbar">
                    <button class="tool-btn" onclick="execCmd('bold')"><i class="fas fa-bold"></i></button>
                    <button class="tool-btn" onclick="execCmd('italic')"><i class="fas fa-italic"></i></button>
                    <input type="color" onchange="execCmd('foreColor', this.value)" style="width:30px; height:30px; border:none; background:none; cursor:pointer;">
                    <button class="tool-btn" onclick="execCmd('hiliteColor', '#ffff00')"><i class="fas fa-highlighter"></i></button>
                    <button class="tool-btn" onclick="execCmd('insertUnorderedList')"><i class="fas fa-list-ul"></i></button>
                </div>
                <div id="note-editor" contenteditable="true" placeholder="Rédigez votre note ici..."></div>
                <button class="btn-main" id="note-save-btn" onclick="saveNote()">Sauvegarder la note</button>
            </div>
            <div id="notes-grid" class="display-grid"></div>
        </section>
    </main>

    <div id="readModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeReadModal()">&times;</span>
            <h2 style="color: var(--primary); margin-bottom:20px;">Détails</h2>
            <div id="full-note-content" style="line-height:1.7; font-size:18px; max-height:60vh; overflow-y:auto;"></div>
        </div>
    </div>

    <script>
        // --- GESTION DU SERVICE WORKER (HORS LIGNE) ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    console.log('Stella : Hors-ligne activé.');
                }).catch(err => console.log('Erreur SW:', err));
            });
        }

        // --- GESTION DE L'INSTALLATION ---
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            console.log("Stella est prête pour l'installation.");
        });

        function installPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') console.log('Installation acceptée');
                    deferredPrompt = null; 
                });
            } else {
                alert("Pour installer Stella sur Android :\n1. Cliquez sur les 3 points du navigateur.\n2. Sélectionnez 'Installer l'application'.");
            }
        }

        // --- LOGIQUE DE L'APPLICATION ---
        let tasks = JSON.parse(localStorage.getItem('stella_tasks')) || [];
        let notes = JSON.parse(localStorage.getItem('stella_notes')) || [];
        let editingNoteId = null;

        function switchView(view) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + view).classList.add('active');
            document.getElementById('btn-' + view).classList.add('active');
            if(view === 'notes') renderNotes();
            if(view === 'agenda') renderTasks();
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('stella_theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-icon').innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        }

        function execCmd(cmd, val = null) { document.execCommand(cmd, false, val); }

        function saveTask() {
            const title = document.getElementById('task-title').value;
            const date = document.getElementById('task-date').value;
            if(!title || !date) return;
            tasks.push({ id: Date.now(), title, date });
            localStorage.setItem('stella_tasks', JSON.stringify(tasks));
            document.getElementById('task-title').value = "";
            document.getElementById('task-date').value = "";
            renderTasks();
        }

        function renderTasks() {
            const grid = document.getElementById('tasks-grid');
            grid.innerHTML = tasks.sort((a,b) => new Date(a.date) - new Date(b.date)).map(t => {
                const dateObj = new Date(t.date);
                return `
                <div class="item-card">
                    <div class="item-body">
                        <strong style="font-size: 17px; color: var(--primary);">${t.title}</strong>
                        <p style="margin-top: 10px;"><i class="fas fa-calendar-alt"></i> ${dateObj.toLocaleDateString()}</p>
                        <p style="color: var(--primary); font-weight: bold;"><i class="fas fa-clock"></i> ${dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</p>
                    </div>
                    <div class="item-actions">
                        <small style="opacity:0.6">À faire</small>
                        <i class="fas fa-check-circle action-icon" style="color:#2ecc71" onclick="deleteTask(${t.id})"></i>
                    </div>
                </div>`;
            }).join('');
        }

        function deleteTask(id) {
            tasks = tasks.filter(x => x.id !== id);
            localStorage.setItem('stella_tasks', JSON.stringify(tasks));
            renderTasks();
        }

        function saveNote() {
            const editor = document.getElementById('note-editor');
            const content = editor.innerHTML.trim();
            if(!content || content === '<br>') return;
            if(editingNoteId !== null) {
                notes = notes.map(n => n.id === editingNoteId ? {...n, content, date: new Date().toLocaleDateString()} : n);
                editingNoteId = null;
                document.getElementById('note-save-btn').innerText = "Sauvegarder la note";
            } else {
                notes.unshift({ id: Date.now(), content, date: new Date().toLocaleDateString() });
            }
            localStorage.setItem('stella_notes', JSON.stringify(notes));
            editor.innerHTML = "";
            renderNotes();
        }

        function renderNotes() {
            const grid = document.getElementById('notes-grid');
            grid.innerHTML = notes.map(n => `
                <div class="item-card">
                    <div class="item-body" style="overflow: hidden; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical;">${n.content}</div>
                    <div class="item-actions">
                        <small style="opacity:0.6">${n.date}</small>
                        <div>
                            <i class="fas fa-eye action-icon" onclick="openReadModal(${n.id})"></i>
                            <i class="fas fa-edit action-icon" onclick="editNote(${n.id})"></i>
                            <i class="fas fa-trash action-icon" style="color:#ff7675" onclick="deleteNote(${n.id})"></i>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function editNote(id) {
            const n = notes.find(x => x.id === id);
            document.getElementById('note-editor').innerHTML = n.content;
            editingNoteId = id;
            document.getElementById('note-save-btn').innerText = "Mettre à jour";
        }

        function deleteNote(id) {
            if(confirm("Supprimer cette note ?")) {
                notes = notes.filter(x => x.id !== id);
                localStorage.setItem('stella_notes', JSON.stringify(notes));
                renderNotes();
            }
        }

        function openReadModal(id) {
            const n = notes.find(x => x.id === id);
            document.getElementById('full-note-content').innerHTML = n.content;
            document.getElementById('readModal').style.display = 'flex';
        }

        function closeReadModal() { document.getElementById('readModal').style.display = 'none'; }

        window.onload = () => {
            if(localStorage.getItem('stella_theme') === 'dark') toggleTheme();
            renderTasks(); renderNotes();
        };
    </script>
</body>
</html>
