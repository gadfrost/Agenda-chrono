<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#6366f1">
    <title>Stella - Assistant Intelligent</title>
    
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --bg-secondary: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --text-lighter: #94a3b8;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.dark-mode {
            --bg: #0f172a;
            --bg-secondary: #1e293b;
            --card: #1e293b;
            --text: #f8fafc;
            --text-light: #cbd5e1;
            --text-lighter: #94a3b8;
            --border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 80px;
            transition: var(--transition);
            line-height: 1.6;
        }

        /* ===== HEADER ===== */
        .header {
            background: var(--card);
            padding: 28px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            position: relative;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 13px;
            color: var(--text-light);
            margin-top: 4px;
        }

        .manual-install-btn,
        .theme-toggle {
            position: absolute;
            cursor: pointer;
            font-size: 20px;
            border: none;
            background: none;
            color: var(--primary);
            padding: 8px;
            border-radius: 8px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .manual-install-btn:hover,
        .theme-toggle:hover {
            background: var(--bg-secondary);
            transform: scale(1.1);
        }

        .manual-install-btn {
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
        }

        .theme-toggle {
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
        }

        /* ===== NAVIGATION TABS ===== */
        .tabs {
            display: flex;
            background: var(--card);
            margin: 20px;
            padding: 6px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            gap: 6px;
            position: sticky;
            top: 20px;
            z-index: 100;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            background: transparent;
            color: var(--text-light);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .tab-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--primary);
            z-index: -1;
            transition: var(--transition);
        }

        .tab-btn:hover::before {
            left: 0;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        /* ===== MAIN CONTENT ===== */
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .view {
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        .view.active {
            display: block;
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* ===== CARDS & COMMON ELEMENTS ===== */
        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: var(--transition);
        }

        .card:hover {
            box-shadow: var(--shadow-lg);
        }

        input[type="text"],
        input[type="datetime-local"],
        input[type="color"] {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 12px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            background: var(--bg-secondary);
            color: var(--text);
            font-size: 16px;
            outline: none;
            transition: var(--transition);
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="datetime-local"]:focus {
            border-color: var(--primary);
            background: var(--card);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        input[type="text"]::placeholder,
        input[type="datetime-local"]::placeholder {
            color: var(--text-lighter);
        }

        .btn-main {
            width: 100%;
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn-main::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn-main:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-main:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
        }

        .btn-main:active {
            transform: translateY(0);
        }

        /* ===== GRID LAYOUT ===== */
        .display-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            width: 100%;
            animation: fadeIn 0.4s ease-out;
        }

        /* ===== ITEM CARDS ===== */
        .item-card {
            background: var(--card);
            padding: 20px;
            border-radius: 14px;
            border: 1px solid var(--border);
            min-height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: var(--shadow);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .item-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary) 0%, var(--primary-light) 100%);
        }

        .item-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-4px);
        }

        .item-body {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 12px;
            color: var(--text);
        }

        .item-body strong {
            color: var(--primary);
            font-weight: 700;
            font-size: 17px;
        }

        .item-body p {
            margin-top: 8px;
            color: var(--text-light);
            font-size: 14px;
        }

        .item-body i {
            margin-right: 6px;
            color: var(--primary);
        }

        .item-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border);
            padding-top: 12px;
            margin-top: 12px;
        }

        .item-actions small {
            color: var(--text-lighter);
            font-size: 12px;
            font-weight: 500;
        }

        .action-icon {
            color: var(--primary);
            font-size: 18px;
            cursor: pointer;
            margin-left: 12px;
            transition: var(--transition);
            padding: 6px;
            border-radius: 6px;
        }

        .action-icon:hover {
            transform: scale(1.2);
            background: rgba(99, 102, 241, 0.1);
        }

        .action-icon[style*="color:#2ecc71"]:hover {
            background: rgba(16, 185, 129, 0.1);
        }

        .action-icon[style*="color:#ff7675"]:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        /* ===== TOOLBAR (NOTES) ===== */
        .toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            background: var(--bg-secondary);
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .tool-btn {
            width: 38px;
            height: 38px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            font-size: 16px;
        }

        .tool-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: scale(1.05);
        }

        /* ===== NOTE EDITOR ===== */
        #note-editor {
            min-height: 180px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            background: var(--bg-secondary);
            outline: none;
            margin-bottom: 16px;
            font-size: 15px;
            line-height: 1.6;
            transition: var(--transition);
            font-family: inherit;
            color: var(--text);
        }

        #note-editor:focus {
            border-color: var(--primary);
            background: var(--card);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        #note-editor[contenteditable]:empty:before {
            content: attr(placeholder);
            color: var(--text-lighter);
        }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            z-index: 10000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            animation: fadeIn 0.3s ease-out;
        }

        .modal-content {
            background: var(--card);
            padding: 32px;
            border-radius: 16px;
            width: 90%;
            max-width: 700px;
            position: relative;
            box-shadow: var(--shadow-xl);
            animation: slideUp 0.3s ease-out;
            max-height: 90vh;
            overflow-y: auto;
        }

        .close-modal {
            position: absolute;
            right: 20px;
            top: 16px;
            font-size: 28px;
            cursor: pointer;
            color: var(--text-light);
            transition: var(--transition);
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }

        .close-modal:hover {
            background: var(--bg-secondary);
            color: var(--text);
            transform: rotate(90deg);
        }

        #full-note-content {
            line-height: 1.8;
            font-size: 16px;
            max-height: 60vh;
            overflow-y: auto;
            color: var(--text);
            word-wrap: break-word;
            word-break: break-word;
        }

        /* ===== SCROLLBAR STYLING ===== */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
            transition: var(--transition);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-dark);
        }

        /* ===== RESPONSIVE DESIGN ===== */
        @media (max-width: 768px) {
            .header {
                padding: 20px 16px;
            }

            .header h1 {
                font-size: 28px;
            }

            .tabs {
                margin: 16px;
                gap: 4px;
            }

            .tab-btn {
                padding: 10px 12px;
                font-size: 13px;
            }

            .card {
                padding: 18px;
                margin-bottom: 18px;
            }

            .display-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .modal-content {
                width: 95%;
                padding: 24px;
            }

            main {
                padding: 0 12px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding-bottom: 60px;
            }

            .header h1 {
                font-size: 24px;
            }

            .header p {
                font-size: 12px;
            }

            .tabs {
                margin: 12px;
            }

            .tab-btn {
                padding: 8px 10px;
                font-size: 12px;
                gap: 4px;
            }

            .tab-btn i {
                display: none;
            }

            .card {
                padding: 16px;
                border-radius: 12px;
            }

            .item-card {
                min-height: 140px;
                padding: 16px;
            }

            .btn-main {
                padding: 12px 16px;
                font-size: 14px;
            }

            input[type="text"],
            input[type="datetime-local"] {
                padding: 10px 12px;
                font-size: 14px;
            }

            #note-editor {
                min-height: 150px;
                padding: 12px;
                font-size: 14px;
            }

            .modal-content {
                padding: 20px;
            }

            .close-modal {
                right: 12px;
                top: 12px;
            }
        }

        /* ===== DARK MODE ENHANCEMENTS ===== */
        body.dark-mode input[type="text"],
        body.dark-mode input[type="datetime-local"] {
            background: var(--bg-secondary);
            border-color: var(--border);
        }

        body.dark-mode #note-editor {
            background: var(--bg-secondary);
        }

        body.dark-mode .toolbar {
            background: var(--bg-secondary);
        }

        /* ===== ACCESSIBILITY ===== */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        @media (prefers-color-scheme: dark) {
            :root {
                color-scheme: dark;
            }
        }
    </style>
</head>
<body>

    <header class="header">
        <button id="manual-install" class="manual-install-btn" onclick="installPWA()" title="Installer l'application"><i class="fas fa-cloud-download-alt"></i></button>
        <div>
            <h1>STELLA</h1>
            <p>Votre Assistant Intelligent</p>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-icon" title="Basculer le thème"><i class="fas fa-moon"></i></button>
    </header>

    <nav class="tabs">
        <button class="tab-btn active" id="btn-agenda" onclick="switchView('agenda')"><i class="fas fa-calendar-alt"></i> <span>Agenda</span></button>
        <button class="tab-btn" id="btn-notes" onclick="switchView('notes')"><i class="fas fa-pen-fancy"></i> <span>Notes</span></button>
    </nav>

    <main>
        <section id="view-agenda" class="view active">
            <div class="card">
                <input type="text" id="task-title" placeholder="Titre de la tâche (ex: Examen de PHP)">
                <input type="datetime-local" id="task-date">
                <button class="btn-main" onclick="saveTask()">Enregistrer la tâche</button>
            </div>
            <div id="tasks-grid" class="display-grid"></div>
        </section>

        <section id="view-notes" class="view">
            <div class="card">
                <div class="toolbar">
                    <button class="tool-btn" onclick="execCmd('bold')" title="Gras"><i class="fas fa-bold"></i></button>
                    <button class="tool-btn" onclick="execCmd('italic')" title="Italique"><i class="fas fa-italic"></i></button>
                    <input type="color" onchange="execCmd('foreColor', this.value)" style="width:38px; height:38px; border:1px solid var(--border); background:none; cursor:pointer; border-radius:8px;" title="Couleur du texte">
                    <button class="tool-btn" onclick="execCmd('hiliteColor', '#ffff00')" title="Surligneur"><i class="fas fa-highlighter"></i></button>
                    <button class="tool-btn" onclick="execCmd('insertUnorderedList')" title="Liste"><i class="fas fa-list-ul"></i></button>
                </div>
                <div id="note-editor" contenteditable="true" placeholder="Rédigez votre note ici..."></div>
                <button class="btn-main" id="note-save-btn" onclick="saveNote()">Sauvegarder la note</button>
            </div>
            <div id="notes-grid" class="display-grid"></div>
        </section>
    </main>

    <div id="readModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeReadModal()">&times;</span>
            <h2 style="color: var(--primary); margin-bottom:20px; font-size: 24px;">Détails de la note</h2>
            <div id="full-note-content"></div>
        </div>
    </div>

    <script>
        // --- GESTION DU SERVICE WORKER (HORS LIGNE) ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    console.log('Stella : Hors-ligne activé.');
                }).catch(err => console.log('Erreur SW:', err));
            });
        }

        // --- GESTION DE L'INSTALLATION ---
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            console.log("Stella est prête pour l'installation.");
        });

        function installPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') console.log('Installation acceptée');
                    deferredPrompt = null; 
                });
            } else {
                alert("Pour installer Stella sur Android :\n1. Cliquez sur les 3 points du navigateur.\n2. Sélectionnez 'Installer l'application'.");
            }
        }

        // --- LOGIQUE DE L'APPLICATION ---
        let tasks = JSON.parse(localStorage.getItem('stella_tasks')) || [];
        let notes = JSON.parse(localStorage.getItem('stella_notes')) || [];
        let editingNoteId = null;

        function switchView(view) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + view).classList.add('active');
            document.getElementById('btn-' + view).classList.add('active');
            if(view === 'notes') renderNotes();
            if(view === 'agenda') renderTasks();
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('stella_theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-icon').innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        }

        function execCmd(cmd, val = null) { document.execCommand(cmd, false, val); }

        function saveTask() {
            const title = document.getElementById('task-title').value.trim();
            const date = document.getElementById('task-date').value;
            if(!title || !date) {
                alert('Veuillez remplir tous les champs');
                return;
            }
            tasks.push({ id: Date.now(), title, date });
            localStorage.setItem('stella_tasks', JSON.stringify(tasks));
            document.getElementById('task-title').value = "";
            document.getElementById('task-date').value = "";
            renderTasks();
        }

        function renderTasks() {
            const grid = document.getElementById('tasks-grid');
            if(tasks.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--text-light); padding: 40px 20px;">Aucune tâche pour le moment. Créez-en une !</p>';
                return;
            }
            grid.innerHTML = tasks.sort((a,b) => new Date(a.date) - new Date(b.date)).map(t => {
                const dateObj = new Date(t.date);
                return `
                <div class="item-card">
                    <div class="item-body">
                        <strong>${t.title}</strong>
                        <p><i class="fas fa-calendar-alt"></i> ${dateObj.toLocaleDateString('fr-FR')}</p>
                        <p><i class="fas fa-clock"></i> ${dateObj.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })}</p>
                    </div>
                    <div class="item-actions">
                        <small>À faire</small>
                        <i class="fas fa-check-circle action-icon" style="color:#10b981" onclick="deleteTask(${t.id})" title="Marquer comme fait"></i>
                    </div>
                </div>`;
            }).join('');
        }

        function deleteTask(id) {
            tasks = tasks.filter(x => x.id !== id);
            localStorage.setItem('stella_tasks', JSON.stringify(tasks));
            renderTasks();
        }

        function saveNote() {
            const editor = document.getElementById('note-editor');
            const content = editor.innerHTML.trim();
            if(!content || content === '<br>') {
                alert('Veuillez écrire une note');
                return;
            }
            if(editingNoteId !== null) {
                notes = notes.map(n => n.id === editingNoteId ? {...n, content, date: new Date().toLocaleDateString('fr-FR')} : n);
                editingNoteId = null;
                document.getElementById('note-save-btn').innerText = "Sauvegarder la note";
            } else {
                notes.unshift({ id: Date.now(), content, date: new Date().toLocaleDateString('fr-FR') });
            }
            localStorage.setItem('stella_notes', JSON.stringify(notes));
            editor.innerHTML = "";
            renderNotes();
        }

        function renderNotes() {
            const grid = document.getElementById('notes-grid');
            if(notes.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--text-light); padding: 40px 20px;">Aucune note pour le moment. Créez-en une !</p>';
                return;
            }
            grid.innerHTML = notes.map(n => `
                <div class="item-card">
                    <div class="item-body" style="overflow: hidden; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical;">${n.content}</div>
                    <div class="item-actions">
                        <small>${n.date}</small>
                        <div>
                            <i class="fas fa-eye action-icon" onclick="openReadModal(${n.id})" title="Voir la note complète"></i>
                            <i class="fas fa-edit action-icon" onclick="editNote(${n.id})" title="Modifier"></i>
                            <i class="fas fa-trash action-icon" style="color:#ef4444" onclick="deleteNote(${n.id})" title="Supprimer"></i>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function editNote(id) {
            const n = notes.find(x => x.id === id);
            document.getElementById('note-editor').innerHTML = n.content;
            editingNoteId = id;
            document.getElementById('note-save-btn').innerText = "Mettre à jour";
            document.getElementById('btn-notes').click();
            document.getElementById('note-editor').focus();
        }

        function deleteNote(id) {
            if(confirm("Êtes-vous sûr de vouloir supprimer cette note ?")) {
                notes = notes.filter(x => x.id !== id);
                localStorage.setItem('stella_notes', JSON.stringify(notes));
                renderNotes();
            }
        }

        function openReadModal(id) {
            const n = notes.find(x => x.id === id);
            document.getElementById('full-note-content').innerHTML = n.content;
            document.getElementById('readModal').style.display = 'flex';
        }

        function closeReadModal() { document.getElementById('readModal').style.display = 'none'; }

        window.onload = () => {
            if(localStorage.getItem('stella_theme') === 'dark') toggleTheme();
            renderTasks(); 
            renderNotes();
        };
    </script>
</body>
</html>
