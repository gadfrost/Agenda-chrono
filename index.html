<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#87CEEB">
    <title>Stella - Assistant</title>
    
    <script src="https://pl28725493.profitablecpmratenetwork.com/92/24/15/922415557c0b2e238f75d831946ca7cc.js"></script>
    
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --primary: #87CEEB; --bg: #f8fafc; --white: #ffffff;
            --text-dark: #1e293b; --text-light: #64748b; --border: #e2e8f0;
            --shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        body.dark-mode {
            --bg: #0f172a; --white: #1e293b; --text-dark: #f8fafc;
            --text-light: #94a3b8; --border: #334155;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: var(--text-dark); min-height: 100vh; padding-bottom: 80px; }
        
        .header { background: var(--white); padding: 20px; text-align: center; border-bottom: 1px solid var(--border); position: relative; }
        .theme-toggle { position: absolute; right: 20px; top: 20px; cursor: pointer; font-size: 20px; border: none; background: none; color: var(--text-light); }

        .nav-tabs { display: flex; background: var(--white); margin: 15px; padding: 5px; border-radius: 12px; box-shadow: var(--shadow); }
        .nav-btn { flex: 1; padding: 12px; border: none; background: transparent; color: var(--text-light); font-weight: bold; border-radius: 10px; cursor: pointer; }
        .nav-btn.active { background: var(--primary); color: white; }

        main { padding: 0 15px; max-width: 600px; margin: 0 auto; }
        section { display: none; }
        section.active { display: block; }

        .card { background: var(--white); padding: 15px; border-radius: 15px; box-shadow: var(--shadow); margin-bottom: 15px; border: 1px solid var(--border); }
        input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); color: var(--text-dark); margin-bottom: 10px; }
        
        /* Zone de saisie RICH TEXT (Pour la couleur) */
        #note-editor { 
            min-height: 200px; padding: 15px; border: 2px dashed var(--primary); 
            border-radius: 10px; background: var(--bg); color: var(--text-dark);
            margin-bottom: 15px; outline: none; overflow-y: auto;
        }

        .toolbar { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .tool-btn { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--white); cursor: pointer; color: var(--text-dark); }

        .btn-save { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }

        .notes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .note-item { background: var(--white); padding: 12px; border-radius: 12px; border-top: 4px solid var(--primary); height: 140px; overflow: hidden; position: relative; box-shadow: var(--shadow); }

        /* BANNIÈRE D'INSTALLATION (LA BARRE BLEUE) */
        #install-bar {
            display: none; position: fixed; bottom: 0; left: 0; right: 0; 
            background: var(--primary); color: white; padding: 15px;
            z-index: 10000; justify-content: space-between; align-items: center;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
        }
        #install-bar button { background: white; color: var(--primary); border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <header class="header">
        <h1 style="color: var(--primary);">STELLA</h1>
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-icon"><i class="fas fa-moon"></i></button>
    </header>

    <nav class="nav-tabs">
        <button class="nav-btn active" onclick="switchTab('agenda')">Agenda</button>
        <button class="nav-btn" onclick="switchTab('notes')">Notes</button>
    </nav>

    <main>
        <section id="sec-agenda" class="active">
            <div class="card">
                <input type="text" id="task-text" placeholder="📝 Nouvelle tâche...">
                <div style="display: flex; gap: 5px;">
                    <input type="date" id="task-date">
                    <input type="time" id="task-time">
                </div>
                <button class="btn-save" onclick="addTask()">Enregistrer l'événement</button>
            </div>
            <div id="task-list"></div>
        </section>

        <section id="sec-notes">
            <div class="toolbar">
                <button class="tool-btn" onclick="execCmd('bold')"><i class="fas fa-bold"></i></button>
                <input type="color" id="txt-color" onchange="execCmd('foreColor', this.value)" style="width:40px; height:35px; padding:0; border:none;">
                <button class="tool-btn" onclick="execCmd('insertUnorderedList')"><i class="fas fa-list"></i></button>
            </div>
            
            <div id="note-editor" contenteditable="true" placeholder="Écrivez ici et utilisez la couleur..."></div>
            <button class="btn-save" onclick="saveNote()" style="margin-bottom: 20px;">Sauvegarder la note</button>
            
            <div id="notes-list" class="notes-grid"></div>
        </section>
    </main>

    <div id="install-bar">
        <span>Installer Stella sur cet appareil ?</span>
        <button onclick="installApp()">INSTALLER</button>
    </div>

    <script>
        let deferredPrompt;
        let tasks = JSON.parse(localStorage.getItem('stella_tasks')) || [];
        let notes = JSON.parse(localStorage.getItem('stella_notes')) || [];

        // --- SYSTÈME D'INSTALLATION ---
        window.addEventListener('beforeinstallprompt', (e) => {
            console.log("L'événement d'installation est détecté !");
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-bar').style.display = 'flex';
        });

        function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(() => {
                    document.getElementById('install-bar').style.display = 'none';
                    deferredPrompt = null;
                });
            }
        }

        // --- ÉDITEUR (COULEUR & STYLE) ---
        function execCmd(cmd, value = null) {
            document.execCommand(cmd, false, value);
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('stella_theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-icon').innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        }

        function switchTab(tab) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            if(tab === 'agenda') {
                document.querySelector('.nav-btn:nth-child(1)').classList.add('active');
                document.getElementById('sec-agenda').classList.add('active');
            } else {
                document.querySelector('.nav-btn:nth-child(2)').classList.add('active');
                document.getElementById('sec-notes').classList.add('active');
                renderNotes();
            }
        }

        // --- LOGIQUE NOTES ---
        function saveNote() {
            const content = document.getElementById('note-editor').innerHTML;
            if(content.trim() === "") return;
            notes.unshift({ id: Date.now(), content, date: new Date().toLocaleDateString() });
            localStorage.setItem('stella_notes', JSON.stringify(notes));
            document.getElementById('note-editor').innerHTML = "";
            renderNotes();
        }

        function renderNotes() {
            const list = document.getElementById('notes-list');
            list.innerHTML = "";
            notes.forEach(n => {
                const div = document.createElement('div');
                div.className = 'note-item';
                div.innerHTML = `<div style="font-size:12px;">${n.content}</div><div style="font-size:9px; position:absolute; bottom:5px; color:var(--text-light);">${n.date}</div>`;
                list.appendChild(div);
            });
        }

        // --- LOGIQUE AGENDA ---
        function addTask() {
            const text = document.getElementById('task-text').value;
            const date = document.getElementById('task-date').value;
            if(!text || !date) return;
            tasks.push({ text, date, time: document.getElementById('task-time').value });
            localStorage.setItem('stella_tasks', JSON.stringify(tasks));
            document.getElementById('task-text').value = "";
            renderTasks();
        }

        function renderTasks() {
            const list = document.getElementById('task-list');
            list.innerHTML = "";
            tasks.forEach(t => {
                const item = document.createElement('div');
                item.className = 'card';
                item.innerHTML = `<strong>${t.text}</strong><br><small>${t.date} ${t.time}</small>`;
                list.appendChild(item);
            });
        }

        window.onload = () => {
            if(localStorage.getItem('stella_theme') === 'dark') toggleTheme();
            renderTasks();
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js');
            }
        };
    </script>
</body>
</html>
