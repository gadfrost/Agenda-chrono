<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#87CEEB">
    <title>Stella - Assistant Intelligent</title>
    
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary: #87CEEB; --bg: #f8fafc; --card: #ffffff;
            --text: #1e293b; --text-light: #64748b; --border: #e2e8f0;
            --shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        body.dark-mode {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
            --text-light: #94a3b8; --border: #334155;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 80px; transition: 0.3s; }

        /* Header & Navigation */
        .header { background: var(--card); padding: 25px; text-align: center; border-bottom: 3px solid var(--primary); position: relative; box-shadow: var(--shadow); }
        .manual-install-btn { position: absolute; left: 20px; top: 25px; cursor: pointer; font-size: 22px; border: none; background: none; color: var(--primary); }
        .theme-toggle { position: absolute; right: 20px; top: 25px; cursor: pointer; font-size: 22px; border: none; background: none; color: var(--primary); }

        .tabs { display: flex; background: var(--card); margin: 20px; padding: 5px; border-radius: 15px; box-shadow: var(--shadow); gap: 5px; }
        .tab-btn { flex: 1; padding: 14px; border: none; border-radius: 12px; background: transparent; color: var(--text-light); font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .tab-btn.active { background: var(--primary); color: white; }

        main { max-width: 800px; margin: 0 auto; padding: 0 15px; }
        .view { display: none; }
        .view.active { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Formulaires */
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); }
        input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1.5px solid var(--border); border-radius: 10px; background: var(--bg); color: var(--text); font-size: 16px; }
        .btn-main { width: 100%; padding: 16px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: bold; font-size: 16px; cursor: pointer; }

        /* GRILLE DES NOTES (Correction plein écran) */
        .notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; width: 100%; }
        .note-card { 
            background: var(--card); padding: 15px; border-radius: 18px; border-top: 5px solid var(--primary); 
            height: 180px; display: flex; flex-direction: column; justify-content: space-between;
            box-shadow: var(--shadow); overflow: hidden;
        }
        .note-body { font-size: 14px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; }
        .note-actions { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 8px; }
        .action-icon { color: var(--primary); font-size: 18px; cursor: pointer; }

        /* Modale */
        .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; position: relative; }
        .close-modal { position: absolute; right: 20px; top: 15px; font-size: 28px; cursor: pointer; }
    </style>
</head>
<body>

    <header class="header">
        <button class="manual-install-btn" onclick="installPWA()"><i class="fas fa-cloud-download-alt"></i></button>
        <h1 style="color: var(--primary);">STELLA</h1>
        <p style="font-size: 13px;">Accueil - Votre Assistant</p>
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-icon"><i class="fas fa-moon"></i></button>
    </header>

    <nav class="tabs">
        <button class="tab-btn active" id="btn-agenda" onclick="switchView('agenda')"><i class="fas fa-calendar-alt"></i> Agenda</button>
        <button class="tab-btn" id="btn-notes" onclick="switchView('notes')"><i class="fas fa-pen-fancy"></i> Notes</button>
    </nav>

    <main>
        <section id="view-agenda" class="view active">
            <div class="card">
                <input type="text" id="task-title" placeholder="Titre de la tâche">
                <input type="date" id="task-date">
                <button class="btn-main" onclick="saveTask()">Enregistrer</button>
            </div>
            <div id="tasks-container"></div>
        </section>

        <section id="view-notes" class="view">
            <div class="card">
                <div id="note-editor" contenteditable="true" style="min-height:120px; border:1px solid var(--border); border-radius:10px; padding:10px; margin-bottom:10px; outline:none;" placeholder="Écrire ici..."></div>
                <button class="btn-main" id="note-save-btn" onclick="saveNote()">Sauvegarder la note</button>
            </div>
            <div id="notes-grid" class="notes-grid"></div>
        </section>
    </main>

    <div id="readModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeReadModal()">&times;</span>
            <h2 style="color: var(--primary); margin-bottom:15px;">Note</h2>
            <div id="full-note-content" style="line-height:1.6; max-height:60vh; overflow-y:auto;"></div>
        </div>
    </div>

    <script>
        let deferredPrompt;
        let tasks = JSON.parse(localStorage.getItem('stella_tasks')) || [];
        let notes = JSON.parse(localStorage.getItem('stella_notes')) || [];
        let editingId = null;

        // --- PWA ---
        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; });
        function installPWA() {
            if(deferredPrompt) { deferredPrompt.prompt(); }
            else { alert("Allez dans le menu de Chrome > Installer l'application."); }
        }

        // --- NAVIGATION ---
        function switchView(view) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + view).classList.add('active');
            document.getElementById('btn-' + view).classList.add('active');
            if(view === 'notes') renderNotes();
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('stella_theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-icon').innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        }

        // --- NOTES (Correction Modif/Suppr) ---
        function saveNote() {
            const editor = document.getElementById('note-editor');
            const content = editor.innerHTML.trim();
            if(!content || content === '<br>') return;

            if(editingId !== null) {
                notes = notes.map(n => n.id === editingId ? {...n, content, date: new Date().toLocaleDateString()} : n);
                editingId = null;
                document.getElementById('note-save-btn').innerText = "Sauvegarder la note";
            } else {
                notes.unshift({ id: Date.now(), content, date: new Date().toLocaleDateString() });
            }

            localStorage.setItem('stella_notes', JSON.stringify(notes));
            editor.innerHTML = "";
            renderNotes();
        }

        function renderNotes() {
            const grid = document.getElementById('notes-grid');
            grid.innerHTML = notes.map(n => `
                <div class="note-card">
                    <div class="note-body">${n.content}</div>
                    <div class="note-actions">
                        <small style="opacity:0.6">${n.date}</small>
                        <div style="display:flex; gap:10px;">
                            <i class="fas fa-eye action-icon" onclick="openReadModal(${n.id})"></i>
                            <i class="fas fa-edit action-icon" onclick="editNote(${n.id})"></i>
                            <i class="fas fa-trash action-icon" style="color:#ff7675" onclick="deleteNote(${n.id})"></i>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function editNote(id) {
            const n = notes.find(x => x.id === id);
            document.getElementById('note-editor').innerHTML = n.content;
            editingId = id;
            document.getElementById('note-save-btn').innerText = "Mettre à jour";
            window.scrollTo(0, 80);
        }

        function deleteNote(id) {
            if(confirm("Supprimer cette note ?")) {
                notes = notes.filter(x => x.id !== id);
                localStorage.setItem('stella_notes', JSON.stringify(notes));
                renderNotes();
            }
        }

        function openReadModal(id) {
            const n = notes.find(x => x.id === id);
            document.getElementById('full-note-content').innerHTML = n.content;
            document.getElementById('readModal').style.display = 'flex';
        }

        function closeReadModal() { document.getElementById('readModal').style.display = 'none'; }

        // --- AGENDA ---
        function saveTask() {
            const title = document.getElementById('task-title').value;
            const date = document.getElementById('task-date').value;
            if(!title || !date) return;
            tasks.push({ id: Date.now(), title, date });
            localStorage.setItem('stella_tasks', JSON.stringify(tasks));
            document.getElementById('task-title').value = "";
            renderTasks();
        }

        function renderTasks() {
            const container = document.getElementById('tasks-container');
            container.innerHTML = tasks.map(t => `
                <div class="card" style="padding:15px; display:flex; justify-content:space-between; align-items:center;">
                    <div><strong>${t.title}</strong><br><small>${t.date}</small></div>
                    <i class="fas fa-check-circle action-icon" onclick="deleteTask(${t.id})"></i>
                </div>
            `).join('');
        }

        function deleteTask(id) {
            tasks = tasks.filter(x => x.id !== id);
            localStorage.setItem('stella_tasks', JSON.stringify(tasks));
            renderTasks();
        }

        window.onload = () => {
            if(localStorage.getItem('stella_theme') === 'dark') toggleTheme();
            renderTasks(); renderNotes();
            if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
        };
    </script>
</body>
</html>
