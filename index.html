<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#87CEEB">
    <title>Stella - Assistant Intelligent</title>
    
    <script src="https://pl28725493.profitablecpmratenetwork.com/92/24/15/922415557c0b2e238f75d831946ca7cc.js"></script>
    
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --primary: #87CEEB; --accent: #4682b4; --bg: #f8fafc; --white: #ffffff;
            --text-dark: #1e293b; --text-light: #64748b; --border: #e2e8f0;
            --shadow: 0 10px 15px -3px rgba(0,0,0,0.1); --card-bg: #ffffff;
        }

        body.dark-mode {
            --bg: #0f172a; --white: #1e293b; --text-dark: #f8fafc;
            --text-light: #94a3b8; --border: #334155; --card-bg: #1e293b;
            --shadow: 0 10px 15px -3px rgba(0,0,0,0.5);
        }

        body { font-family: 'Inter', system-ui, sans-serif; background-color: var(--bg); color: var(--text-dark); min-height: 100vh; transition: 0.3s ease; }
        
        /* Header Amélioré */
        .header { 
            background: linear-gradient(135deg, var(--white) 0%, var(--bg) 100%);
            padding: 30px 20px; text-align: center; border-bottom: 1px solid var(--border);
            position: relative; overflow: hidden;
        }
        .header h1 { font-size: 28px; font-weight: 900; letter-spacing: -1px; color: var(--primary); }
        .theme-toggle { position: absolute; right: 20px; top: 25px; cursor: pointer; font-size: 22px; color: var(--text-light); border: none; background: none; }

        /* Navigation Style "Pilule" */
        .nav-tabs { 
            display: flex; background: var(--white); margin: -20px 20px 20px; 
            padding: 5px; border-radius: 15px; box-shadow: var(--shadow);
            justify-content: center; gap: 5px; position: sticky; top: 10px; z-index: 1000;
        }
        .nav-btn { flex: 1; padding: 12px; border: none; background: transparent; color: var(--text-light); font-weight: 700; border-radius: 12px; transition: 0.3s; font-size: 14px; }
        .nav-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(135, 206, 235, 0.4); }

        main { padding: 0 20px 40px; max-width: 600px; margin: 0 auto; }
        section { display: none; opacity: 0; transform: translateY(10px); transition: 0.4s; }
        section.active { display: block; opacity: 1; transform: translateY(0); }

        /* Cartes Style Moderne */
        .card { 
            background: var(--card-bg); padding: 20px; border-radius: 20px; 
            box-shadow: var(--shadow); margin-bottom: 25px; border: 1px solid var(--border);
        }
        input, select { 
            width: 100%; padding: 14px; border: 1.5px solid var(--border); border-radius: 12px; 
            background: var(--bg); color: var(--text-dark); margin-bottom: 15px; font-size: 15px;
        }
        .btn-main { 
            width: 100%; padding: 16px; background: linear-gradient(135deg, var(--primary), var(--accent)); 
            color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* Liste de tâches */
        .task-item {
            background: var(--card-bg); padding: 15px; border-radius: 15px; margin-bottom: 12px;
            display: flex; align-items: center; gap: 15px; border: 1px solid var(--border);
        }
        .task-checkbox { width: 22px; height: 22px; accent-color: var(--primary); }

        /* Grille de Notes */
        .notes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .note-card { 
            background: var(--card-bg); padding: 15px; border-radius: 18px; 
            box-shadow: var(--shadow); height: 160px; display: flex; flex-direction: column;
            border: 1px solid var(--border); position: relative; border-top: 5px solid var(--primary);
        }
        .note-card-preview { font-size: 13px; line-height: 1.4; overflow: hidden; flex: 1; color: var(--text-dark); }
        .note-card-date { font-size: 10px; color: var(--text-light); margin-top: 8px; font-weight: bold; }

        /* Modal Plein Écran pour l'Édition */
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); 
            backdrop-filter: blur(8px); z-index: 2000; align-items: flex-end; 
        }
        .modal-content { 
            background: var(--card-bg); width: 100%; height: 90vh; border-radius: 30px 30px 0 0; 
            display: flex; flex-direction: column; animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        #note-editor { 
            flex: 1; padding: 25px; outline: none; font-size: 17px; 
            line-height: 1.8; overflow-y: auto; color: var(--text-dark);
        }

        .toolbar { 
            padding: 20px; background: var(--white); border-top: 1px solid var(--border);
            display: flex; gap: 12px; align-items: center;
        }
        
        .hl-btn { padding: 10px 18px; border-radius: 10px; border: none; background: var(--bg); color: var(--text-dark); font-weight: bold; }

        /* Bannière Installation */
        #install-banner { 
            display: none; position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: var(--primary); color: white; padding: 15px; border-radius: 15px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); z-index: 3000;
            justify-content: space-between; align-items: center;
        }
    </style>
</head>
<body class="light-mode">

    <header class="header">
        <h1>STELLA</h1>
        <p>Accueil • Intelligent & Fluide</p>
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-icon">
            <i class="fas fa-moon"></i>
        </button>
    </header>

    <nav class="nav-tabs">
        <button class="nav-btn active" onclick="switchTab('agenda')"><i class="fas fa-calendar-day"></i> Agenda</button>
        <button class="nav-btn" onclick="switchTab('notes')"><i class="fas fa-pen-fancy"></i> Mes Notes</button>
    </nav>

    <main>
        <section id="sec-agenda" class="active">
            <div class="card">
                <input type="text" id="task-text" placeholder="📝 Qu'allez-vous accomplir ?">
                <div style="display: flex; gap: 10px;">
                    <input type="date" id="task-date">
                    <input type="time" id="task-time">
                </div>
                <button class="btn-main" onclick="addTask()">Planifier la tâche</button>
            </div>
            <div id="task-list"></div>
        </section>

        <section id="sec-notes">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="font-size: 20px;">Bibliothèque</h2>
                <button onclick="openNoteModal()" style="background:var(--primary); color:white; border:none; padding:10px 20px; border-radius:12px; font-weight:900;">+ NOUVEAU</button>
            </div>
            <div id="notes-list" class="notes-grid"></div>
        </section>
    </main>

    <div id="note-modal" class="modal">
        <div class="modal-content">
            <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);">
                <strong id="modal-title">Édition de texte</strong>
                <button onclick="closeNoteModal()" style="background:none; border:none; font-size:28px; color:var(--text-light);">&times;</button>
            </div>
            <div id="note-editor" contenteditable="true" placeholder="Commencez à rédiger ici..."></div>
            <div class="toolbar">
                <input type="color" id="hl-color" value="#87CEEB" style="width:40px; height:40px; border:none; padding:0; background:none;">
                <button class="hl-btn" onclick="applyHl()">Surligner</button>
                <button onclick="saveNote()" style="margin-left:auto; background:var(--primary); color:white; border:none; padding:12px 25px; border-radius:12px; font-weight:bold;">ENREGISTRER</button>
            </div>
        </div>
    </div>

    <div id="install-banner">
        <span>Installer Stella sur votre écran ?</span>
        <button onclick="installApp()" style="background:white; color:var(--primary); border:none; padding:8px 15px; border-radius:8px; font-weight:bold;">INSTALLER</button>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('stella_tasks')) || [];
        let notes = JSON.parse(localStorage.getItem('stella_notes')) || [];
        let currentNoteId = null;
        let deferredPrompt;

        // Theme
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('stella_theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-icon').innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        }

        // Tabs
        function switchTab(tab) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            if(tab === 'agenda') {
                document.querySelector('.nav-btn:nth-child(1)').classList.add('active');
                document.getElementById('sec-agenda').classList.add('active');
            } else {
                document.querySelector('.nav-btn:nth-child(2)').classList.add('active');
                document.getElementById('sec-notes').classList.add('active');
                renderNotes();
            }
        }

        // Agenda
        function addTask() {
            const text = document.getElementById('task-text').value;
            const date = document.getElementById('task-date').value;
            const time = document.getElementById('task-time').value;
            if(!text || !date || !time) return;
            tasks.push({ id: Date.now(), text, date, time });
            localStorage.setItem('stella_tasks', JSON.stringify(tasks));
            document.getElementById('task-text').value = '';
            renderTasks();
        }

        function renderTasks() {
            const list = document.getElementById('task-list');
            list.innerHTML = "";
            tasks.sort((a,b) => new Date(a.date+' '+a.time) - new Date(b.date+' '+b.time)).forEach(t => {
                const item = document.createElement('div');
                item.className = 'task-item';
                item.innerHTML = `<input type="checkbox" class="task-checkbox" onchange="deleteTask(${t.id})">
                                  <div style="flex:1"><strong>${t.text}</strong><br><small>${t.date} à ${t.time}</small></div>`;
                list.appendChild(item);
            });
        }

        function deleteTask(id) {
            setTimeout(() => {
                tasks = tasks.filter(t => t.id !== id);
                localStorage.setItem('stella_tasks', JSON.stringify(tasks));
                renderTasks();
            }, 300);
        }

        // Notes
        function openNoteModal(id = null) {
            currentNoteId = id;
            const editor = document.getElementById('note-editor');
            if(id) {
                const note = notes.find(n => n.id === id);
                editor.innerHTML = note.content;
            } else { editor.innerHTML = ""; }
            document.getElementById('note-modal').style.display = 'flex';
        }

        function closeNoteModal() { document.getElementById('note-modal').style.display = 'none'; }

        function saveNote() {
            const content = document.getElementById('note-editor').innerHTML;
            if(!content.trim()) return;
            if(currentNoteId) {
                notes = notes.map(n => n.id === currentNoteId ? {...n, content, date: new Date().toLocaleDateString()} : n);
            } else {
                notes.unshift({ id: Date.now(), content, date: new Date().toLocaleDateString() });
            }
            localStorage.setItem('stella_notes', JSON.stringify(notes));
            closeNoteModal(); renderNotes();
        }

        function renderNotes() {
            const list = document.getElementById('notes-list');
            list.innerHTML = "";
            notes.forEach(n => {
                const card = document.createElement('div');
                card.className = 'note-card';
                card.onclick = () => openNoteModal(n.id);
                card.innerHTML = `<div class="note-card-preview">${n.content}</div>
                                  <div class="note-card-date">${n.date}</div>
                                  <button onclick="event.stopPropagation(); deleteNote(${n.id})" style="position:absolute; top:10px; right:10px; border:none; background:none; color:var(--text-light);"><i class="fas fa-trash"></i></button>`;
                list.appendChild(card);
            });
        }

        function deleteNote(id) {
            if(confirm("Supprimer définitivement ?")) {
                notes = notes.filter(n => n.id !== id);
                localStorage.setItem('stella_notes', JSON.stringify(notes));
                renderNotes();
            }
        }

        function applyHl() {
            const color = document.getElementById('hl-color').value;
            const sel = window.getSelection();
            if (!sel.rangeCount) return;
            const range = sel.getRangeAt(0);
            const span = document.createElement('span');
            span.style.backgroundColor = color + "60";
            span.style.borderRadius = "4px";
            range.surroundContents(span);
        }

        // Initial Load
        window.onload = () => {
            if(localStorage.getItem('stella_theme') === 'dark') toggleTheme();
            renderTasks();
            document.getElementById('task-date').valueAsDate = new Date();
        };

        // PWA
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            document.getElementById('install-banner').style.display = 'flex';
        });

        function installApp() {
            if(deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; }
        }

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }
    </script>
</body>
</html>
